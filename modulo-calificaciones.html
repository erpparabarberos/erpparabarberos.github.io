<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATENCIÓN AL CLIENTE</title>
  <link rel="icon" type="image/png" sizes="32x32" href="https://parabarberos.github.io/1.jpg">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>

  <style>
    body { font-family: "Inter", sans-serif; background-color: #f8fafc; color: #111827; margin: 0; }
    .card { background-color: #ffffff; border: 1px solid #e5e7eb; box-shadow: 0 10px 25px rgba(15, 23, 42, 0.04); border-radius: 0.9rem; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
</head>

<body class="min-h-screen p-4 md:p-8">
  <div id="loading-spinner" class="fixed inset-0 bg-slate-900/80 flex items-center justify-center z-50">
    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-yellow-400"></div>
  </div>

  <div id="dashboard-content" class="max-w-7xl mx-auto hidden">
    <header class="mb-8">
      <h1 class="text-3xl font-extrabold text-gray-900 uppercase">Control Atención al Cliente</h1>
      <p class="text-xs text-gray-500 uppercase">Análisis de rendimiento en tiempo real</p>
    </header>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="card p-4 text-center">
        <p class="text-[10px] uppercase text-gray-400 font-bold">Promedio</p>
        <p id="avg-rating" class="text-2xl font-black text-yellow-500">--</p>
      </div>
      <div class="card p-4 text-center">
        <p class="text-[10px] uppercase text-gray-400 font-bold">Total</p>
        <p id="total-ratings" class="text-2xl font-black text-slate-800">0</p>
      </div>
      <div class="card p-4 text-center">
        <p class="text-[10px] uppercase text-gray-400 font-bold">Asesores</p>
        <p id="total-advisors" class="text-2xl font-black text-emerald-500">0</p>
      </div>
      <div class="card p-4 text-center">
        <p class="text-[10px] uppercase text-gray-400 font-bold">Críticos</p>
        <p id="low-ratings" class="text-2xl font-black text-red-500">0</p>
      </div>
    </div>

    <div class="card p-4 mb-8 flex flex-wrap gap-4 items-end">
      <div class="flex-1 min-w-[150px]">
        <label class="text-[10px] font-bold uppercase text-gray-400">Asesor</label>
        <select id="advisor-filter" class="w-full mt-1 p-2 border rounded-lg text-sm bg-gray-50"></select>
      </div>
      <div class="flex-1 min-w-[150px]">
        <label class="text-[10px] font-bold uppercase text-gray-400">Mes</label>
        <input id="month-filter" type="month" class="w-full mt-1 p-2 border rounded-lg text-sm bg-gray-50" />
      </div>
      <div class="flex gap-2">
        <button id="export-excel-button" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-emerald-700 transition">EXCEL</button>
        <button id="export-pdf-button" class="bg-red-600 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-red-700 transition">PDF</button>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
      <div class="lg:col-span-2 card p-6">
        <h2 class="text-sm font-bold uppercase mb-4">Historial de Calificaciones</h2>
        <div class="max-h-[400px] overflow-y-auto space-y-3" id="ratings-list-container"></div>
      </div>
      <div class="card p-6">
        <h2 class="text-sm font-bold uppercase mb-4">Distribución</h2>
        <div class="h-64"><canvas id="rating-distribution-chart"></canvas></div>
      </div>
    </div>

    <div class="card border-red-100 p-6 mb-8">
      <h2 class="text-lg font-black text-red-600 uppercase mb-4">Casos Críticos por Contactar</h2>
      <div id="critical-container" class="space-y-3"></div>
    </div>

    <div class="card border-emerald-100 p-6">
      <h2 class="text-sm font-bold text-emerald-700 uppercase mb-4">Casos Solucionados</h2>
      <div id="resolved-container" class="space-y-3"></div>
    </div>
  </div>

  <div id="view-modal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl">
      <div id="modal-body" class="space-y-4"></div>
      <button onclick="document.getElementById('view-modal').classList.add('hidden')" class="w-full mt-6 bg-slate-100 py-2 rounded-xl font-bold text-sm">Cerrar</button>
    </div>
  </div>

  <div id="sol-modal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl max-w-sm w-full p-6">
      <h3 class="font-bold mb-4">Registrar Solución</h3>
      <input id="sol-name" type="text" placeholder="Tu nombre" class="w-full p-2 border rounded-lg mb-3">
      <textarea id="sol-text" placeholder="¿Qué se hizo?" class="w-full p-2 border rounded-lg h-24 mb-4 resize-none"></textarea>
      <div class="flex gap-2">
        <button onclick="document.getElementById('sol-modal').classList.add('hidden')" class="flex-1 py-2 border rounded-lg">Cancelar</button>
        <button id="btn-save-sol" class="flex-1 py-2 bg-slate-900 text-white rounded-lg font-bold">Guardar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, collection, query, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDkH2_E7t07SWWH1SZr77BFlNp6RQTDDDY",
      authDomain: "erpparabarberos-12de9.firebaseapp.com",
      projectId: "erpparabarberos-12de9",
      storageBucket: "erpparabarberos-12de9.firebasestorage.app",
      messagingSenderId: "722745790519",
      appId: "1:722745790519:web:7bf1dbe172433898a56fb2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const COLL_PATH = `artifacts/${firebaseConfig.projectId}/public/data/whatsapp_ratings`;

    let rawData = [];
    let filteredData = [];
    let chartObj = null;
    let targetId = null;

    onAuthStateChanged(auth, (user) => {
      if (user) {
        onSnapshot(query(collection(db, COLL_PATH)), (snap) => {
          rawData = [];
          snap.forEach(d => rawData.push({id: d.id, ...d.data()}));
          fillAdvisorFilter();
          process();
        });
        document.getElementById("dashboard-content").classList.remove("hidden");
        document.getElementById("loading-spinner").classList.add("hidden");
      } else {
        window.parent.location.href = 'index.html';
      }
    });

    function process() {
      const adv = document.getElementById("advisor-filter").value;
      const mon = document.getElementById("month-filter").value;
      
      filteredData = rawData.filter(r => {
        let ok = true;
        if(adv) ok = ok && r.advisorId === adv;
        if(mon) ok = ok && r.timestamp?.startsWith(mon);
        return ok;
      }).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

      updateUI();
    }

    function updateUI() {
      // Stats
      const total = filteredData.length;
      const avg = total ? (filteredData.reduce((a,b) => a + (b.rating||0), 0) / total).toFixed(1) : "0";
      document.getElementById("avg-rating").textContent = avg;
      document.getElementById("total-ratings").textContent = total;
      document.getElementById("total-advisors").textContent = new Set(filteredData.map(r=>r.advisorId)).size;
      document.getElementById("low-ratings").textContent = filteredData.filter(r=>r.rating <= 2 && !r.resolved).length;

      // Listado Principal
      const list = document.getElementById("ratings-list-container");
      list.innerHTML = "";
      filteredData.forEach(r => {
        const d = document.createElement("div");
        d.className = "p-3 border rounded-xl flex justify-between items-center bg-gray-50";
        d.innerHTML = `
          <div><p class="text-xs font-bold uppercase">${r.advisorName}</p><p class="text-[10px] text-gray-400">${r.timestamp?.split('T')[0]}</p></div>
          <div class="flex items-center gap-3">
            <span class="font-black ${r.rating <= 2 ? 'text-red-500':'text-emerald-500'}">${r.rating}★</span>
            <button class="text-[10px] font-bold text-slate-400 hover:text-black">DETALLE</button>
          </div>
        `;
        d.querySelector("button").onclick = () => showDetail(r);
        list.appendChild(d);
      });

      // Críticos
      const crit = document.getElementById("critical-container");
      crit.innerHTML = "";
      filteredData.filter(r => r.rating <= 2 && !r.resolved).forEach(r => {
        const d = document.createElement("div");
        d.className = "p-4 border border-red-200 bg-red-50 rounded-xl flex justify-between items-center";
        d.innerHTML = `
          <div><p class="font-bold text-red-700 text-sm">${r.advisorName} - Tel: ${r.clientPhone||'N/A'}</p><p class="text-xs italic">"${r.comments||''}"</p></div>
          <button class="bg-red-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold">SOLUCIONAR</button>
        `;
        d.querySelector("button").onclick = () => { targetId = r.id; document.getElementById("sol-modal").classList.replace("hidden","flex"); };
        crit.appendChild(d);
      });

      // Solucionados
      const res = document.getElementById("resolved-container");
      res.innerHTML = filteredData.filter(r => r.resolved).map(r => `
        <div class="p-3 bg-emerald-50 border border-emerald-100 rounded-xl text-[11px]">
          <p class="font-bold uppercase">${r.advisorName} (${r.rating}★)</p>
          <p class="text-emerald-700 mt-1">Solución: ${r.resolution}</p>
        </div>
      `).join('');

      // Chart
      const dist = [0,0,0,0,0];
      filteredData.forEach(r => { if(r.rating>=1 && r.rating<=5) dist[r.rating-1]++ });
      const ctx = document.getElementById("rating-distribution-chart");
      if(chartObj) chartObj.destroy();
      chartObj = new Chart(ctx, {
        type: 'bar',
        data: { labels:['1★','2★','3★','4★','5★'], datasets:[{data:dist, backgroundColor:['#ef4444','#f97316','#64748b','#3b82f6','#10b981']}]},
        options: { maintainAspectRatio:false, plugins:{legend:{display:false}}}
      });
    }

    function showDetail(r) {
      document.getElementById("modal-body").innerHTML = `
        <h3 class="font-black text-xl border-b pb-2 uppercase">${r.advisorName}</h3>
        <p class="text-4xl font-black text-yellow-500 text-center py-2">${r.rating} ★</p>
        <div class="bg-slate-50 p-4 rounded-xl text-sm italic text-gray-600">"${r.comments || 'Sin comentarios'}"</div>
        <div class="text-[11px] text-gray-400 space-y-1">
          <p>FECHA: ${r.timestamp?.replace('T',' ')}</p>
          <p>TELÉFONO: ${r.clientPhone || 'No registrado'}</p>
        </div>
      `;
      document.getElementById("view-modal").classList.replace("hidden", "flex");
    }

    // BOTÓN PDF (Corregido)
    document.getElementById("export-pdf-button").onclick = () => {
      if(!filteredData.length) return;
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFontSize(18);
      doc.text("REPORTE DE ATENCION AL CLIENTE", 14, 20);
      
      const tableData = filteredData.map(r => [
        r.advisorName,
        r.rating + "★",
        r.comments || "-",
        r.timestamp?.split('T')[0],
        r.clientPhone || "-"
      ]);

      doc.autoTable({
        startY: 30,
        head: [['ASESOR', 'NOTA', 'COMENTARIO', 'FECHA', 'TEL']],
        body: tableData,
        theme: 'grid',
        headStyles: { fillColor: [15, 23, 42] },
        styles: { fontSize: 8 }
      });
      doc.save("Reporte_Calificaciones.pdf");
    };

    // BOTÓN EXCEL/CSV
    document.getElementById("export-excel-button").onclick = () => {
      let csv = "\uFEFFAsesor;Nota;Comentario;Fecha;Telefono\n";
      filteredData.forEach(r => {
        csv += `${r.advisorName};${r.rating};${(r.comments||'').replace(/;/g,',')};${r.timestamp};${r.clientPhone||''}\n`;
      });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8;'}));
      link.download = "Calificaciones.csv";
      link.click();
    };

    document.getElementById("btn-save-sol").onclick = async () => {
      const n = document.getElementById("sol-name").value;
      const t = document.getElementById("sol-text").value;
      if(!n || !t) return alert("Faltan campos");
      await setDoc(doc(db, COLL_PATH, targetId), { resolved:true, resolvedBy:n, resolution:t, resolvedAt:new Date().toISOString() }, {merge:true});
      document.getElementById("sol-modal").classList.add("hidden");
    };

    function fillAdvisorFilter() {
      const sel = document.getElementById("advisor-filter");
      const val = sel.value;
      const unique = [...new Set(rawData.map(r => JSON.stringify({id:r.advisorId, name:r.advisorName})))].map(s => JSON.parse(s));
      sel.innerHTML = '<option value="">Todos los asesores</option>';
      unique.forEach(u => {
        if(u.id) sel.innerHTML += `<option value="${u.id}" ${u.id===val?'selected':''}>${u.name}</option>`;
      });
    }

    document.getElementById("advisor-filter").onchange = process;
    document.getElementById("month-filter").onchange = process;

  </script>
</body>
</html>
