<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP - PARABARBEROS</title>
    <link rel="icon" href="logo.jpg?v=3">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
    </style>
</head>
<body class="flex items-center justify-center h-screen bg-slate-900 text-slate-900">

    <div class="w-full max-w-md p-10 bg-white rounded-[24px] shadow-2xl border border-slate-200">
        <div class="text-center mb-10">
            <img src="logo.jpg" alt="Logo Parabarberos" class="h-28 mx-auto mb-4 object-contain pointer-events-none" style="mix-blend-mode: multiply;">
            <h1 class="text-2xl font-black text-slate-900 tracking-tight uppercase">ERP Central</h1>
            <p class="text-xs text-slate-400 font-bold tracking-widest uppercase mt-1">Acceso Restringido</p>
        </div>
        
        <form id="loginForm" class="space-y-6">
            <div>
                <label for="email" class="block text-xs font-black text-slate-500 mb-2 uppercase tracking-wide">Correo Electrónico</label>
                <input type="email" id="email" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 font-semibold placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-900/20 focus:border-slate-900 transition-all" placeholder="usuario@parabarberos.com">
            </div>
            <div>
                <label for="password" class="block text-xs font-black text-slate-500 mb-2 uppercase tracking-wide">Contraseña</label>
                <input type="password" id="password" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 font-bold placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-900/20 focus:border-slate-900 transition-all" placeholder="••••••••">
            </div>
            <div id="errorMessage" class="text-red-500 text-sm text-center font-bold h-5"></div>
            
            <button type="submit" id="btnIngresar" class="w-full py-4 px-4 bg-slate-950 hover:bg-black text-white font-bold rounded-xl shadow-lg shadow-slate-900/10 transition-colors mt-2">
                Ingresar al ERP
            </button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // TUS NUEVAS LLAVES
            const firebaseConfig = {
                apiKey: "AIzaSyDkH2_E7t07SWWH1SZr77BFlNp6RQTDDDY",
                authDomain: "erpparabarberos-12de9.firebaseapp.com",
                projectId: "erpparabarberos-12de9",
                storageBucket: "erpparabarberos-12de9.firebasestorage.app",
                messagingSenderId: "722745790519",
                appId: "1:722745790519:web:7bf1dbe172433898a56fb2"
            };

            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();

            const loginForm = document.getElementById('loginForm');
            const errorMessage = document.getElementById('errorMessage');
            const btnIngresar = document.getElementById('btnIngresar');

            // Redirigir si ya tiene sesión y rol
            auth.onAuthStateChanged(user => {
                if (user && localStorage.getItem('userRole')) window.location.href = 'app.html';
            });

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value.trim().toLowerCase();
                const password = document.getElementById('password').value;
                
                errorMessage.textContent = 'Autenticando y verificando permisos...';
                errorMessage.className = 'text-slate-500 text-sm text-center font-bold h-5';
                btnIngresar.disabled = true;

                auth.signInWithEmailAndPassword(email, password)
                    .then(() => db.collection('usuarios').doc(email).get())
                    .then((doc) => {
                        if (doc.exists) {
                            localStorage.setItem('userRole', doc.data().rol);
                            window.location.href = 'app.html';
                        } else {
                            auth.signOut();
                            throw new Error("sin-rol");
                        }
                    })
                    .catch((error) => {
                        btnIngresar.disabled = false;
                        errorMessage.className = 'text-red-600 text-sm text-center font-bold h-5';
                        if (error.message === "sin-rol") errorMessage.textContent = 'Acceso denegado: Tu correo no tiene un rol asignado.';
                        else errorMessage.textContent = 'Credenciales incorrectas.';
                    });
            });
        });
    </script>
</body>
</html>
