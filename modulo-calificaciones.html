<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATENCIÓN AL CLIENTE</title>
  <link rel="icon" type="image/png" sizes="32x32" href="https://parabarberos.github.io/1.jpg">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>

  <style>
    body { font-family: "Inter", sans-serif; background-color: #f8fafc; color: #111827; margin: 0; }
    ::-webkit-scrollbar { height: 8px; width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .card { background-color: #ffffff; border: 1px solid #e5e7eb; box-shadow: 0 10px 25px rgba(15, 23, 42, 0.04); border-radius: 0.9rem; }
    input, select { background-color: #f9fafb !important; color: #111827 !important; border-color: #d1d5db !important; }
    .low-cases-grid { display: grid; grid-template-columns: minmax(0, 2fr) minmax(0, 3fr) minmax(0, 1.5fr) 40px; align-items: center; column-gap: 0.5rem; }
  </style>
</head>

<body class="min-h-screen p-4 md:p-8">
  <div id="loading-spinner" class="fixed inset-0 bg-slate-900/80 flex items-center justify-center z-50">
    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-yellow-400"></div>
  </div>

  <div id="dashboard-content" class="max-w-7xl mx-auto px-4 md:px-6 lg:px-8 hidden">
    <header class="mb-8">
      <h1 class="text-3xl md:text-4xl font-extrabold text-gray-900 tracking-tight leading-tight uppercase">Control Atención al Cliente</h1>
      <p class="text-xs md:text-sm text-gray-500 mt-1 uppercase">Análisis de rendimiento de asesores</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
      <div class="card rounded-xl px-5 py-4 flex flex-col">
        <p class="text-[12px] text-gray-500 mb-1 uppercase tracking-wide">Asesor</p>
        <select id="advisor-filter" class="mt-1 p-2 rounded-lg border text-sm"><option value="">Todos</option></select>
      </div>
      <div class="card rounded-xl px-5 py-4 flex flex-col">
        <p class="text-[12px] text-gray-500 mb-1 uppercase tracking-wide">Por Mes</p>
        <input id="month-filter" type="month" class="mt-1 p-2 rounded-lg border text-sm" />
      </div>
      <div class="card rounded-xl px-5 py-4 flex flex-col">
        <p class="text-[12px] text-gray-500 mb-1 uppercase tracking-wide">Por Día</p>
        <input id="date-filter" type="date" class="mt-1 p-2 rounded-lg border text-sm" />
      </div>
      <div class="card rounded-xl px-5 py-4 flex flex-col justify-center bg-slate-50">
        <p class="text-[10px] text-slate-400 uppercase font-bold">Estado</p>
        <p class="text-xs text-slate-900 font-bold uppercase">Datos en tiempo real</p>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
      <div class="card rounded-xl px-5 py-4 text-center">
        <p class="text-xs text-gray-500 uppercase">Promedio</p>
        <p id="avg-rating" class="mt-2 text-4xl font-extrabold text-yellow-500">N/A</p>
      </div>
      <div class="card rounded-xl px-5 py-4 text-center">
        <p class="text-xs text-gray-500 uppercase">Total Respuestas</p>
        <p id="total-ratings" class="mt-2 text-4xl font-extrabold text-slate-900">0</p>
      </div>
      <div class="card rounded-xl px-5 py-4 text-center">
        <p class="text-xs text-gray-500 uppercase">Asesores</p>
        <p id="total-advisors" class="mt-2 text-4xl font-extrabold text-emerald-500">0</p>
      </div>
      <div class="card rounded-xl px-5 py-4 text-center">
        <p class="text-xs text-gray-500 uppercase">Críticos</p>
        <p id="low-ratings" class="mt-2 text-4xl font-extrabold text-red-500">0</p>
      </div>
    </div>

    <div class="card rounded-2xl px-6 py-6 mb-10">
      <h2 class="text-sm font-bold text-gray-900 mb-4 uppercase">Distribución de Estrellas</h2>
      <div class="h-64 md:h-72"><canvas id="rating-distribution-chart"></canvas></div>
    </div>

    <div class="mb-4 flex items-center justify-between">
      <h2 class="text-lg font-bold text-gray-900 uppercase">Historial Reciente</h2>
      <div class="flex gap-2">
        <button id="export-excel-button" class="px-4 py-2 bg-emerald-600 text-white rounded-lg text-xs font-bold hover:bg-emerald-700">CSV/EXCEL</button>
        <button id="export-pdf-button" class="px-4 py-2 bg-red-600 text-white rounded-lg text-xs font-bold hover:bg-red-700">PDF</button>
      </div>
    </div>

    <div class="card rounded-2xl p-4 overflow-hidden mb-10">
      <div class="max-h-[400px] overflow-y-auto">
        <div id="ratings-list-container" class="space-y-3"></div>
      </div>
    </div>

    <section class="mb-10">
      <h2 class="text-2xl font-black text-red-600 mb-4 uppercase">Casos Pendientes (1-2★)</h2>
      <div class="card rounded-2xl p-4">
        <div id="critical-container" class="space-y-3"></div>
      </div>
    </section>

    <section>
      <h2 class="text-lg font-bold text-slate-900 mb-4 uppercase">Casos Solucionados</h2>
      <div id="resolved-container" class="card rounded-2xl p-4 space-y-3"></div>
    </section>
  </div>

  <div id="view-rating-modal" class="fixed inset-0 bg-slate-900/60 z-50 hidden items-center justify-center p-4">
    <div class="bg-white rounded-[24px] max-w-md w-full p-8 relative">
      <button type="button" id="close-view-rating-modal" class="absolute top-4 right-4 text-gray-400 text-xl">✕</button>
      <div id="detail-content" class="space-y-4"></div>
    </div>
  </div>

  <div id="solution-modal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-[24px] w-full max-w-md p-8">
      <h2 class="text-xl font-bold mb-4">Solucionar Caso</h2>
      <input id="solution-solver-name" type="text" placeholder="Tu nombre" class="w-full mb-3 p-3 border rounded-xl" />
      <textarea id="solution-description" rows="3" placeholder="¿Qué solución se dio?" class="w-full mb-4 p-3 border rounded-xl resize-none"></textarea>
      <div class="flex justify-end gap-2">
        <button id="solution-cancel-button" class="px-4 py-2 border rounded-xl font-bold text-sm">Cancelar</button>
        <button id="solution-save-button" class="px-4 py-2 bg-slate-900 text-white rounded-xl font-bold text-sm">Guardar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, collection, query, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDkH2_E7t07SWWH1SZr77BFlNp6RQTDDDY",
      authDomain: "erpparabarberos-12de9.firebaseapp.com",
      projectId: "erpparabarberos-12de9",
      storageBucket: "erpparabarberos-12de9.firebasestorage.app",
      messagingSenderId: "722745790519",
      appId: "1:722745790519:web:7bf1dbe172433898a56fb2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const PUBLIC_RATINGS_COLLECTION = `artifacts/${firebaseConfig.projectId}/public/data/whatsapp_ratings`;

    let allRatings = [];
    let chartInstance = null;
    let currentFilteredRatings = [];
    let resolveTargetId = null;

    onAuthStateChanged(auth, (user) => {
      if (user) {
        startRealtimeDataListener();
        document.getElementById("dashboard-content").classList.remove("hidden");
        document.getElementById("loading-spinner").classList.add("hidden");
      } else {
        window.parent.location.href = 'index.html';
      }
    });

    function startRealtimeDataListener() {
      const q = query(collection(db, PUBLIC_RATINGS_COLLECTION));
      onSnapshot(q, (snapshot) => {
        allRatings = [];
        snapshot.forEach(docSnap => allRatings.push({ id: docSnap.id, ...docSnap.data() }));
        updateFilterOptions();
        filterAndDisplay();
      });
    }

    function filterAndDisplay() {
      let f = [...allRatings];
      const adv = document.getElementById("advisor-filter").value;
      const mon = document.getElementById("month-filter").value;
      const day = document.getElementById("date-filter").value;

      if(adv) f = f.filter(r => r.advisorId === adv);
      if(mon) f = f.filter(r => r.timestamp && r.timestamp.startsWith(mon));
      if(day) f = f.filter(r => r.timestamp && r.timestamp.startsWith(day));

      f.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
      currentFilteredRatings = f;
      
      updateStats(f);
      renderList(f);
      renderCritical(f);
      renderResolved(f);
    }

    function updateStats(ratings) {
      const total = ratings.length;
      const avg = total ? (ratings.reduce((s, r) => s + (r.rating || 0), 0) / total).toFixed(1) : "N/A";
      const low = ratings.filter(r => r.rating <= 2).length;
      const advisors = new Set(ratings.map(r => r.advisorId)).size;
      const dist = [0,0,0,0,0];
      ratings.forEach(r => { if(r.rating >=1 && r.rating <=5) dist[r.rating-1]++; });

      document.getElementById("total-ratings").textContent = total;
      document.getElementById("avg-rating").textContent = avg;
      document.getElementById("total-advisors").textContent = advisors;
      document.getElementById("low-ratings").textContent = low;
      
      const ctx = document.getElementById("rating-distribution-chart").getContext("2d");
      if(chartInstance) chartInstance.destroy();
      chartInstance = new Chart(ctx, {
        type: 'bar',
        data: { labels: ['1★','2★','3★','4★','5★'], datasets:[{ data: dist, backgroundColor: ['#ef4444','#f97316','#64748b','#3b82f6','#10b981'], borderRadius: 5 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
      });
    }

    function renderList(ratings) {
      const cont = document.getElementById("ratings-list-container");
      cont.innerHTML = ratings.map(r => `
        <div class="p-4 border rounded-xl flex justify-between items-center bg-white shadow-sm">
          <div>
            <p class="font-bold text-sm uppercase">${r.advisorName || 'Asesor'}</p>
            <p class="text-xs text-slate-500">${r.timestamp?.replace("T"," ")}</p>
          </div>
          <div class="flex items-center gap-4">
            <span class="font-black ${r.rating <= 2 ? 'text-red-500' : 'text-emerald-600'}">${r.rating}★</span>
            <button onclick="openDetail('${r.id}')" class="text-slate-400 hover:text-black">VER</button>
          </div>
        </div>
      `).join('');
    }

    window.openDetail = (id) => {
      const r = allRatings.find(x => x.id === id);
      const cont = document.getElementById("detail-content");
      cont.innerHTML = `
        <h3 class="text-lg font-bold uppercase">${r.advisorName}</h3>
        <p class="text-3xl font-black text-yellow-500">${r.rating} Estrellas</p>
        <p class="bg-slate-50 p-4 rounded-xl italic">"${r.comments || 'Sin comentarios'}"</p>
        <p class="text-xs text-slate-400">Fecha: ${r.timestamp}</p>
        <p class="text-sm font-bold">Tel: ${r.clientPhone || 'N/A'}</p>
      `;
      document.getElementById("view-rating-modal").classList.replace("hidden", "flex");
    };

    function renderCritical(ratings) {
      const cont = document.getElementById("critical-container");
      const crit = ratings.filter(r => r.rating <= 2 && !r.resolved);
      cont.innerHTML = crit.map(r => `
        <div class="p-4 border border-red-100 bg-red-50 rounded-xl flex justify-between items-center">
          <div>
            <p class="font-bold text-red-600">${r.advisorName} - Tel: ${r.clientPhone || 'N/A'}</p>
            <p class="text-xs italic">"${r.comments}"</p>
          </div>
          <button onclick="openResolve('${r.id}')" class="bg-red-600 text-white px-3 py-2 rounded-lg text-xs font-bold">SOLUCIONAR</button>
        </div>
      `).join('');
    }

    window.openResolve = (id) => {
      resolveTargetId = id;
      document.getElementById("solution-modal").classList.replace("hidden", "flex");
    };

    function renderResolved(ratings) {
      const cont = document.getElementById("resolved-container");
      const res = ratings.filter(r => r.rating <= 2 && r.resolved);
      cont.innerHTML = res.map(r => `
        <div class="p-4 border bg-emerald-50/30 rounded-xl text-xs">
          <p class="font-bold uppercase">${r.advisorName} (${r.rating}★)</p>
          <p class="mt-1"><strong>Solución:</strong> ${r.resolution}</p>
          <p class="text-slate-400 mt-1">Por: ${r.resolvedBy}</p>
        </div>
      `).join('');
    }

    // PDF EXPORT
    document.getElementById("export-pdf-button").addEventListener("click", () => {
      if (!currentFilteredRatings.length) return alert("No hay datos");
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFontSize(16);
      doc.text("REPORTE DE CALIFICACIONES", 14, 15);
      
      const data = currentFilteredRatings.map(r => [
        r.advisorName || "-",
        r.rating + "★",
        r.comments || "-",
        r.timestamp?.substring(0,10) || "-",
        r.clientPhone || "-"
      ]);

      doc.autoTable({
        startY: 25,
        head: [['ASESOR', 'NOTA', 'COMENTARIO', 'FECHA', 'TEL']],
        body: data,
        theme: 'striped',
        styles: { fontSize: 8 }
      });

      doc.save(`Reporte_Calificaciones.pdf`);
    });

    // EXCEL/CSV EXPORT
    document.getElementById("export-excel-button").onclick = () => {
      let csv = "\uFEFFAsesor;Nota;Comentario;Fecha;Telefono\n";
      currentFilteredRatings.forEach(r => {
        csv += `${r.advisorName || ''};${r.rating};${(r.comments || '').replace(/;/g, ',')};${r.timestamp};${r.clientPhone || ''}\n`;
      });
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "Calificaciones.csv";
      link.click();
    };

    // Cerrar Modales
    document.getElementById("close-view-rating-modal").onclick = () => document.getElementById("view-rating-modal").classList.replace("flex", "hidden");
    document.getElementById("solution-cancel-button").onclick = () => document.getElementById("solution-modal").classList.replace("flex", "hidden");

    document.getElementById("solution-save-button").onclick = async () => {
      const name = document.getElementById("solution-solver-name").value;
      const desc = document.getElementById("solution-description").value;
      if(!name || !desc) return alert("Llena los campos");
      await setDoc(doc(db, PUBLIC_RATINGS_COLLECTION, resolveTargetId), { 
        resolved: true, resolvedBy: name, resolution: desc, resolvedAt: new Date().toISOString() 
      }, { merge: true });
      document.getElementById("solution-modal").classList.replace("flex", "hidden");
    };

    function updateFilterOptions() {
      const sel = document.getElementById("advisor-filter");
      const current = sel.value;
      const names = [...new Set(allRatings.map(r => JSON.stringify({id: r.advisorId, name: r.advisorName})))].map(s => JSON.parse(s));
      sel.innerHTML = '<option value="">Todos</option>';
      names.forEach(n => {
        if(!n.id) return;
        const opt = document.createElement("option");
        opt.value = n.id; opt.textContent = n.name; opt.selected = (n.id === current);
        sel.appendChild(opt);
      });
    }

    document.getElementById("advisor-filter").onchange = filterAndDisplay;
    document.getElementById("month-filter").onchange = filterAndDisplay;
    document.getElementById("date-filter").onchange = filterAndDisplay;

  </script>
</body>
</html>
