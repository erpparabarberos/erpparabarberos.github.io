<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS PB</title>
    <link rel="icon" type="image/jpeg" href="https://erpparabarberos.github.io/logo-nexus.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
    </style>
</head>
<body class="flex items-center justify-center h-screen bg-slate-900 text-slate-900">

    <div class="w-full max-w-md p-10 bg-white rounded-[24px] shadow-2xl border border-slate-200">
        <div class="text-center mb-10">
           <img src="https://erpparabarberos.github.io/logo-nexus.jpg" alt="Logo Nexus" style="width: 150px; max-width: 100%; height: auto; margin: 0 auto 20px auto; display: block;">
            <h1 class="text-2xl font-black text-slate-900 tracking-tight uppercase">NEXUS PB</h1>
            <p class="text-xs text-slate-400 font-bold tracking-widest uppercase mt-1">ERP</p>
        </div>
        
<form id="loginForm" class="space-y-4">
    <div>
        <label for="email" class="block text-xs font-black text-slate-500 mb-1.5 uppercase tracking-wide">Correo Electrónico</label>
        <input type="email" id="email" required class="w-full px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl text-slate-900 font-semibold placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-900/20 focus:border-slate-900 transition-all" placeholder="usuario@parabarberos.com">
    </div>
    
    <div>
        <label for="password" class="block text-xs font-black text-slate-500 mb-1.5 uppercase tracking-wide">Contraseña</label>
        <input type="password" id="password" required class="w-full px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl text-slate-900 font-bold placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-900/20 focus:border-slate-900 transition-all" placeholder="••••••••">
    </div>
    
    <div id="errorMessage" class="text-red-500 text-xs text-center font-bold h-4"></div>
    
    <button type="submit" id="btnIngresar" class="w-full py-2.5 px-4 text-sm bg-slate-950 hover:bg-black text-white font-bold rounded-xl shadow-lg shadow-slate-900/10 transition-colors flex items-center justify-center gap-2">
        Ingresar al Sistema
    </button>
</form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // TUS LLAVES REALES INTEGRADAS CORRECTAMENTE EN MODO "COMPAT"
            const firebaseConfig = {
                apiKey: "AIzaSyDkH2_E7t07SWWH1SZr77BFlNp6RQTDDDY",
                authDomain: "erpparabarberos-12de9.firebaseapp.com",
                projectId: "erpparabarberos-12de9",
                storageBucket: "erpparabarberos-12de9.firebasestorage.app",
                messagingSenderId: "722745790519",
                appId: "1:722745790519:web:7bf1dbe172433898a56fb2"
            };

            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();

            const loginForm = document.getElementById('loginForm');
            const errorMessage = document.getElementById('errorMessage');
            const btnIngresar = document.getElementById('btnIngresar');

            auth.onAuthStateChanged(user => {
                if (user && localStorage.getItem('userRole')) {
                    window.location.href = 'app.html';
                }
            });

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value.trim().toLowerCase();
                const password = document.getElementById('password').value;
                
                errorMessage.textContent = 'Autenticando y verificando permisos...';
                errorMessage.className = 'text-slate-500 text-sm text-center font-bold h-auto';
                btnIngresar.disabled = true;

                auth.signInWithEmailAndPassword(email, password)
                    .then(() => {
                        return db.collection('usuarios').doc(email).get();
                    })
                    .then((doc) => {
                        if (doc.exists) {
                            localStorage.setItem('userRole', doc.data().rol);
                            window.location.href = 'app.html';
                        } else {
                            auth.signOut();
                            throw new Error("sin-rol");
                        }
                    })
                    .catch((error) => {
                        btnIngresar.disabled = false;
                        errorMessage.className = 'text-red-600 text-sm text-center font-bold h-auto leading-tight';
                        
                        console.error("Detalle del error:", error);

                        if (error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                            errorMessage.textContent = 'Contraseña incorrecta o usuario no encontrado.';
                        } else if (error.message === "sin-rol") {
                            errorMessage.textContent = 'Acceso denegado: El correo existe, pero no tiene un rol asignado en la base de datos.';
                        } else {
                            errorMessage.textContent = 'Error: ' + error.message; 
                        }
                    });
            });
        });
    </script>
</body>
</html>
